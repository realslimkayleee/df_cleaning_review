<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get a Free Estimate | DF Cleaning</title>
  <meta name="description" content="Request a free cleaning estimate from DF Cleaning. Fill out our simple form and our team will get back to you with a custom quote.">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/header.js" defer></script>
  <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
</head>
<body class="global-bg">

  <site-header root-path=""></site-header>

  <main>
    <!-- ESTIMATE PAGE V2 (TWO-COLUMN LUXURY) -->
    <div class="estimate-page-wrapper">
      <!-- Background Image Integration -->
      <img src="assets/hero_house.png" alt="DF Cleaning services" class="estimate-bg-image" />
      <div class="estimate-bg-overlay"></div>
      
      <div class="estimate-container">
        <!-- LEFT COLUMN: INFO PANEL -->
        <div class="estimate-info-panel reveal-up">
          <div class="estimate-headline-group">
            <h1>Request Estimate<span class="text-blue">.</span></h1>
            <p>Fill out the form and we'll get back to you with a fast, no-obligation estimate.</p>
          </div>
          
          <div class="estimate-contact-cards">
            <!-- Call Us Card -->
            <div class="estimate-card">
              <div class="estimate-card-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                </svg>
              </div>
              <div class="estimate-card-content">
                <h3>Call Us</h3>
                <a href="tel:+17373679177">(737) 367-9177</a>
              </div>
            </div>
            
            <!-- Availability Card -->
            <div class="estimate-card">
              <div class="estimate-card-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"></circle>
                  <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
              </div>
              <div class="estimate-card-content">
                <h3>Business Hours</h3>
                <p>We're Available! Open 24/7</p>
              </div>
            </div>
          </div>
        </div>

        <!-- RIGHT COLUMN: FORM CARD -->
        <div class="estimate-form-card reveal-up" style="transition-delay: 0.2s;">
          <div class="estimate-form-header">
            <div class="icon-wrap">
              <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
              </svg>
            </div>
            <h2>Tell Us About Your Project</h2>
            <p style="margin-bottom: 2rem;">Our estimates are completely customized based on your specific needs and space.</p>
          </div>
          
          <site-contact-form root-path="" inline></site-contact-form>
        </div>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <site-footer root-path=""></site-footer>

  <script src="js/main.js"></script>
</body>
</html>
