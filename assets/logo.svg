<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="100%" height="100%">
  <!-- House Icon -->
  <g transform="translate(10, 10)">
    <!-- Main blue roof & walls -->
    <path d="M 30 5 L 55 25 L 55 55 L 5 55 L 5 25 Z" fill="none" stroke="#0056b3" stroke-width="4.5" stroke-linejoin="round"/>
    <!-- Yellow roof accent -->
    <path d="M 2 26 L 30 3 L 58 26" fill="none" stroke="#ffb703" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Yellow sparkles/star (Spotless representation) -->
    <path d="M 23 20 L 25 15 L 27 20 L 32 22 L 27 24 L 25 29 L 23 24 L 18 22 Z" fill="#ffb703"/>
    <path d="M 40 12 L 41 9 L 42 12 L 45 13 L 42 14 L 41 17 L 40 14 L 37 13 Z" fill="#ffb703"/>
    <!-- DF Initials inside house -->
    <text x="30" y="46" font-family="'Outfit', 'Inter', sans-serif" font-size="14" font-weight="900" fill="#0056b3" text-anchor="middle">DF</text>
  </g>

  <!-- Typography -->
  <text x="85" y="38" font-family="'Outfit', 'Inter', sans-serif" font-size="24" font-weight="900" fill="#0c2340" letter-spacing="0.5">DF CLEANING</text>
  <text x="85" y="56" font-family="'Inter', sans-serif" font-size="8.5" font-weight="700" fill="#0056b3" letter-spacing="2">OUR REPUTATION IS SPOTLESS</text>
</svg>
